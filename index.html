<!DOCTYPE html>
<html lang="de" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Berichtskatalog</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("berichtskatalog-theme");
          if (stored === "dark" || stored === "light") {
            document.documentElement.dataset.theme = stored;
          } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            document.documentElement.dataset.theme = "dark";
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div class="page-shell">
      <header class="brandbar">
        <div class="brandbar-inner">
          <div class="brand-left">
            <h1>Berichtskatalog</h1>
          </div>

          <div class="brand-right">
            <button
              type="button"
              class="call-button"
              id="call-button"
              aria-label="Sprachgespräch starten"
              title="Bericht per Sprache erfassen"
            >
              <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M7.5 1a2.5 2.5 0 00-2.5 2.5v4a2.5 2.5 0 005 0v-4A2.5 2.5 0 007.5 1zM5 7.5a2.5 2.5 0 005 0M3 6v1.5a4.5 4.5 0 009 0V6M7.5 12v2M5.5 14h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/>
              </svg>
              Anrufen
            </button>
            <button
              type="button"
              class="theme-toggle"
              id="theme-toggle"
              role="switch"
              aria-checked="false"
              aria-label="Darstellung umschalten"
              title="Light/Dark Mode umschalten"
            >
              <span class="theme-toggle__track" aria-hidden="true">
                <span class="theme-toggle__thumb"></span>
              </span>
            </button>
            <img
              class="brand-logo brand-logo--light"
              src="./assets/accantec_part_of_x1f.png"
              alt="accantec"
            />
            <img
              class="brand-logo brand-logo--dark"
              src="./assets/accantec_logo_x1f_white.png"
              alt="accantec"
            />
          </div>
        </div>
      </header>

      <nav class="app-nav" id="app-nav">
        <button class="app-nav__tab app-nav__tab--active" data-tab="chat">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1.5A.5.5 0 011.5 1h12a.5.5 0 01.5.5v9a.5.5 0 01-.5.5H8l-3 3v-3H1.5a.5.5 0 01-.5-.5v-9z" stroke="currentColor" stroke-width="1.2" fill="none"/>
          </svg>
          Erfassung
        </button>
        <button class="app-nav__tab" data-tab="entries">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="1" y="1" width="13" height="13" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
            <line x1="4" y1="5" x2="11" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="4" y1="8" x2="11" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            <line x1="4" y1="11" x2="8" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Gespeicherte Einträge
        </button>
      </nav>

      <main class="page-content">
        <section class="assistant-card" id="tab-chat">
          <div id="assistant-content"></div>
        </section>

        <section class="summary-card" id="tab-entries" hidden>
          <h2>Gespeicherte Einträge</h2>
          <div id="saved-entries" class="saved-entries"></div>
        </section>
      </main>
    </div>

    <div id="voice-overlay" class="voice-overlay" hidden>
      <div class="voice-orb-wrap">
        <div class="voice-orb" id="voice-orb"></div>
      </div>
      <p class="voice-status" id="voice-status">Verbinde…</p>
      <button type="button" class="voice-end-btn" id="voice-end-btn">Gespräch beenden</button>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
